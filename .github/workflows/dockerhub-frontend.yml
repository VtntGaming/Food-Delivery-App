name: Build and Push Frontend Image

on:
  pull_request:
    paths:
      - 'src/Frontend/food_delivery_app/**'
      - '.github/workflows/dockerhub-frontend.yml'
  push:
    branches:
      - main
    paths:
      - 'src/Frontend/food_delivery_app/**'
      - '.github/workflows/dockerhub-frontend.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: food-delivery-frontend

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image namespace
        id: image
        run: |
          if [ -n "${{ vars.DOCKERHUB_NAMESPACE }}" ]; then
            echo "namespace=${{ vars.DOCKERHUB_NAMESPACE }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "namespace=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "namespace=${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.namespace }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./src/Frontend/food_delivery_app
          file: ./src/Frontend/food_delivery_app/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
